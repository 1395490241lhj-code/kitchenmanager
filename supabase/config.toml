project_id = "kitchenmanager"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

# Phase 2C-4: disabled for local development. The default `vector`/
# `logflare` analytics/log-routing containers try to bind-mount the host
# Docker socket in a way that is incompatible with Colima's VM filesystem
# (`mkdir .../docker.sock: operation not supported`) — a known Colima
# limitation, not a schema/migration defect. Analytics/log-routing has no
# bearing on migration replay, pgTAP, or RLS validation.
[analytics]
enabled = false
