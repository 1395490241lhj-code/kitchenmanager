    <script>
      // 首屏前同步应用外观主题，避免浅/深色闪烁（FOUC）。
      // 'system' 会被解析成具体 light/dark，使 <html data-theme> 始终存在，
      // 让深色组件样式（玻璃弹窗、卡片、分段控件等）统一由 data-theme 驱动。
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('km_v23_settings')) || {};
          var t = (s.theme === 'light' || s.theme === 'dark') ? s.theme : 'system';
          var eff = t === 'system'
            ? ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light')
            : t;
          document.documentElement.setAttribute('data-theme', eff);
        } catch (e) {}
      })();
    </script>
