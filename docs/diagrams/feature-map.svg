<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Manager Feature Map</title>
  <desc id="desc">A module map of Kitchen Manager features centered around the product core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#f4fff9"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#263247" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 44px; font-weight: 850; fill: #172033; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; fill: #607086; }
      .module-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 26px; font-weight: 820; fill: #172033; }
      .module-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #334155; }
      .core-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 33px; font-weight: 850; fill: #fff; }
      .core-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #e0f2fe; }
      .line { stroke: #b7c4d6; stroke-width: 3; stroke-linecap: round; opacity: 0.8; }
    </style>
  </defs>
  <rect width="1600" height="1000" rx="36" fill="url(#bg)"/>
  <circle cx="250" cy="170" r="190" fill="#fde68a" opacity="0.24"/>
  <circle cx="1320" cy="230" r="230" fill="#bae6fd" opacity="0.32"/>
  <circle cx="790" cy="850" r="230" fill="#bbf7d0" opacity="0.25"/>
  <text x="70" y="78" class="title">Kitchen Manager Feature Map</text>
  <text x="72" y="116" class="subtitle">当前功能模块的项目地图：今日页是入口，推荐、计划、买菜、AI 和数据安全形成闭环。</text>

  <!-- Relationship lines -->
  <line class="line" x1="800" y1="500" x2="305" y2="222"/>
  <line class="line" x1="800" y1="500" x2="800" y2="222"/>
  <line class="line" x1="800" y1="500" x2="1295" y2="222"/>
  <line class="line" x1="800" y1="500" x2="305" y2="482"/>
  <line class="line" x1="800" y1="500" x2="1295" y2="482"/>
  <line class="line" x1="800" y1="500" x2="305" y2="742"/>
  <line class="line" x1="800" y1="500" x2="800" y2="742"/>
  <line class="line" x1="800" y1="500" x2="1295" y2="742"/>
  <line class="line" x1="800" y1="500" x2="800" y2="910"/>
  <line class="line" x1="800" y1="500" x2="1095" y2="910"/>

  <g filter="url(#shadow)">
    <circle cx="800" cy="500" r="145" fill="url(#core)"/>
    <text x="675" y="492" class="core-title">Kitchen Manager</text>
    <text x="708" y="530" class="core-sub">local-first kitchen assistant</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="270" height="165" rx="26" fill="#fff" stroke="#bfe0ff"/>
    <text x="100" y="205" class="module-title">今日页</text>
    <text x="100" y="245" class="module-text">今日状态 / 今日计划</text>
    <text x="100" y="281" class="module-text">推荐 / 备份提示</text>
    <text x="100" y="317" class="module-text">PWA 提示</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="665" y="160" width="270" height="165" rx="26" fill="#fff" stroke="#d1e7bd"/>
    <text x="695" y="205" class="module-title">食材录入</text>
    <text x="695" y="245" class="module-text">文本批量记 / 手动录入</text>
    <text x="695" y="281" class="module-text">小票识别</text>
    <text x="695" y="317" class="module-text">确认后写库存</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1260" y="160" width="270" height="165" rx="26" fill="#fff" stroke="#f7d0a5"/>
    <text x="1290" y="205" class="module-title">推荐系统</text>
    <text x="1290" y="245" class="module-text">库存匹配 / 临期提醒</text>
    <text x="1290" y="281" class="module-text">缺食材摘要</text>
    <text x="1290" y="317" class="module-text">推荐卡主操作</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="420" width="270" height="165" rx="26" fill="#fff" stroke="#ffd0dc"/>
    <text x="100" y="465" class="module-title">今日计划</text>
    <text x="100" y="505" class="module-text">加入计划</text>
    <text x="100" y="541" class="module-text">缺菜检测</text>
    <text x="100" y="577" class="module-text">饭后记一下</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1260" y="420" width="270" height="165" rx="26" fill="#fff" stroke="#c9edf1"/>
    <text x="1290" y="465" class="module-title">买菜清单</text>
    <text x="1290" y="505" class="module-text">缺菜加入</text>
    <text x="1290" y="541" class="module-text">手动添加</text>
    <text x="1290" y="577" class="module-text">买完入库</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="680" width="270" height="165" rx="26" fill="#fff" stroke="#dfd5ff"/>
    <text x="100" y="725" class="module-title">菜谱系统</text>
    <text x="100" y="765" class="module-text">菜谱详情 / 快速弹窗</text>
    <text x="100" y="801" class="module-text">菜谱补丁</text>
    <text x="100" y="837" class="module-text">自定义修改</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="665" y="680" width="270" height="165" rx="26" fill="#fff" stroke="#badff9"/>
    <text x="695" y="725" class="module-title">AI 服务</text>
    <text x="695" y="765" class="module-text">内置云端 / BYOK</text>
    <text x="695" y="801" class="module-text">小票 / 菜谱导入</text>
    <text x="695" y="837" class="module-text">失败兜底</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1260" y="680" width="270" height="165" rx="26" fill="#fff" stroke="#bce8ce"/>
    <text x="1290" y="725" class="module-title">数据安全</text>
    <text x="1290" y="765" class="module-text">localStorage / 完整备份</text>
    <text x="1290" y="801" class="module-text">导入确认 / 不含 Key</text>
    <text x="1290" y="837" class="module-text">本地优先</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="665" y="860" width="270" height="120" rx="26" fill="#fff" stroke="#f5c2e7"/>
    <text x="695" y="904" class="module-title">设置页</text>
    <text x="695" y="940" class="module-text">常用设置 / AI 服务</text>
    <text x="695" y="970" class="module-text">数据安全 / 高级设置</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="860" width="270" height="120" rx="26" fill="#fff" stroke="#fed7aa"/>
    <text x="990" y="904" class="module-title">PWA</text>
    <text x="990" y="940" class="module-text">添加到主屏幕</text>
    <text x="990" y="970" class="module-text">Service Worker / 缓存</text>
  </g>
</svg>
