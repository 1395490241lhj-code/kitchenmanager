<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Manager Development Workflow</title>
  <desc id="desc">Kitchen Manager development workflow grouped into preparation, understanding, editing, checks, validation, and release.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#f5f7ff"/>
      <stop offset="1" stop-color="#eefdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#233044" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#637083"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 42px; font-weight: 800; fill: #172033; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; fill: #5c6678; }
      .card-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 800; fill: #182133; }
      .card-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; fill: #30394a; }
      .badge { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .note { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #6a7280; }
      .arrow { fill: none; stroke: #637083; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="1160" cy="120" r="170" fill="#d7f4ff" opacity="0.45"/>
  <circle cx="220" cy="770" r="190" fill="#dff7e8" opacity="0.55"/>
  <circle cx="760" cy="820" r="150" fill="#efe5ff" opacity="0.38"/>

  <text x="70" y="82" class="title">Kitchen Manager Development Workflow</text>
  <text x="72" y="118" class="subtitle">小步修改，保护核心厨房流程；每次交付都要可检查、可回滚、可说明。</text>

  <!-- Row 1 -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" width="360" height="250" rx="28" fill="#ffffff" stroke="#d4e4ff" stroke-width="2"/>
    <rect x="70" y="170" width="360" height="70" rx="28" fill="#dbeafe"/>
    <circle cx="112" cy="205" r="21" fill="#2563eb"/>
    <text x="105" y="213" class="badge">1</text>
    <text x="150" y="215" class="card-title">准备</text>
    <text x="105" y="278" class="card-text">阅读 PROJECT_WORKFLOW.md</text>
    <text x="105" y="318" class="card-text">确认任务范围</text>
    <text x="105" y="358" class="card-text">git status / git pull</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="170" width="360" height="250" rx="28" fill="#ffffff" stroke="#d6f0df" stroke-width="2"/>
    <rect x="520" y="170" width="360" height="70" rx="28" fill="#dcfce7"/>
    <circle cx="562" cy="205" r="21" fill="#16a34a"/>
    <text x="555" y="213" class="badge">2</text>
    <text x="600" y="215" class="card-title">理解</text>
    <text x="555" y="278" class="card-text">阅读相关文件</text>
    <text x="555" y="318" class="card-text">明确本次不改什么</text>
    <text x="555" y="358" class="card-text">制定小步计划</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="970" y="170" width="360" height="250" rx="28" fill="#ffffff" stroke="#fae3b5" stroke-width="2"/>
    <rect x="970" y="170" width="360" height="70" rx="28" fill="#fef3c7"/>
    <circle cx="1012" cy="205" r="21" fill="#d97706"/>
    <text x="1005" y="213" class="badge">3</text>
    <text x="1050" y="215" class="card-title">修改</text>
    <text x="1005" y="278" class="card-text">小步修改</text>
    <text x="1005" y="318" class="card-text">保护核心流程</text>
    <text x="1005" y="358" class="card-text">不改无关文件</text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#shadow)">
    <rect x="70" y="535" width="360" height="250" rx="28" fill="#ffffff" stroke="#e2d8ff" stroke-width="2"/>
    <rect x="70" y="535" width="360" height="70" rx="28" fill="#ede9fe"/>
    <circle cx="112" cy="570" r="21" fill="#7c3aed"/>
    <text x="105" y="578" class="badge">4</text>
    <text x="150" y="580" class="card-title">检查</text>
    <text x="105" y="640" class="card-text">git diff --stat / --check</text>
    <text x="105" y="680" class="card-text">node --check</text>
    <text x="105" y="720" class="card-text">node --test</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="535" width="360" height="250" rx="28" fill="#ffffff" stroke="#ffd6df" stroke-width="2"/>
    <rect x="520" y="535" width="360" height="70" rx="28" fill="#ffe4e6"/>
    <circle cx="562" cy="570" r="21" fill="#e11d48"/>
    <text x="555" y="578" class="badge">5</text>
    <text x="600" y="580" class="card-title">验收</text>
    <text x="555" y="640" class="card-text">今日页 / 弹窗</text>
    <text x="555" y="680" class="card-text">设置页 / AI</text>
    <text x="555" y="720" class="card-text">备份 / PWA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="970" y="535" width="360" height="250" rx="28" fill="#ffffff" stroke="#c9edf1" stroke-width="2"/>
    <rect x="970" y="535" width="360" height="70" rx="28" fill="#cffafe"/>
    <circle cx="1012" cy="570" r="21" fill="#0891b2"/>
    <text x="1005" y="578" class="badge">6</text>
    <text x="1050" y="580" class="card-title">发布</text>
    <text x="1005" y="640" class="card-text">commit / push</text>
    <text x="1005" y="680" class="card-text">GitHub Pages / Render</text>
    <text x="1005" y="720" class="card-text">线上验收与缓存排查</text>
  </g>

  <!-- Arrows -->
  <path class="arrow" d="M430 295 C465 295, 485 295, 520 295"/>
  <path class="arrow" d="M880 295 C915 295, 935 295, 970 295"/>
  <path class="arrow" d="M1150 420 C1150 470, 250 470, 250 535"/>
  <path class="arrow" d="M430 660 C465 660, 485 660, 520 660"/>
  <path class="arrow" d="M880 660 C915 660, 935 660, 970 660"/>

  <rect x="70" y="825" width="1260" height="44" rx="22" fill="#ffffff" opacity="0.72" stroke="#d7dee9"/>
  <text x="100" y="854" class="note">原则：UI 改 UI，逻辑改逻辑；任何用户入口不能绕过缺菜检测；文档任务不需要 node --test。</text>
</svg>
