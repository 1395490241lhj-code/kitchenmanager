<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Manager Data and AI Flow</title>
  <desc id="desc">A swimlane diagram showing local-first data flow, AI request boundaries, and backup safety rules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#fffaf3"/>
      <stop offset="1" stop-color="#effdf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#243044" flood-opacity="0.13"/>
    </filter>
    <marker id="localArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="aiArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="backupArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#d97706"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 44px; font-weight: 850; fill: #172033; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; fill: #607086; }
      .lane-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 27px; font-weight: 830; fill: #172033; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; font-weight: 800; fill: #172033; }
      .box-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #334155; }
      .note { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #526072; }
      .local { fill: none; stroke: #16a34a; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#localArrow); }
      .ai { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#aiArrow); }
      .backup { fill: none; stroke: #d97706; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#backupArrow); }
      .boundary { fill: none; stroke: #ef4444; stroke-width: 3; stroke-dasharray: 10 9; }
    </style>
  </defs>
  <rect width="1600" height="1000" rx="36" fill="url(#bg)"/>
  <text x="70" y="78" class="title">Kitchen Manager Data and AI Flow</text>
  <text x="72" y="116" class="subtitle">local-first 是边界：AI 只辅助整理，用户确认后才写入本地数据。</text>

  <!-- Swimlanes -->
  <g filter="url(#shadow)">
    <rect x="70" y="165" width="1460" height="160" rx="28" fill="#fff" stroke="#d8e0ec"/>
    <text x="100" y="212" class="lane-title">User Actions</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="350" width="1460" height="170" rx="28" fill="#fff" stroke="#d8e0ec"/>
    <text x="100" y="398" class="lane-title">Frontend PWA</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="545" width="1460" height="170" rx="28" fill="#fff" stroke="#d8e0ec"/>
    <text x="100" y="593" class="lane-title">Local Data</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="740" width="1460" height="165" rx="28" fill="#fff" stroke="#d8e0ec"/>
    <text x="100" y="788" class="lane-title">Backend / External</text>
  </g>

  <!-- User actions -->
  <g filter="url(#shadow)">
    <rect x="300" y="195" width="170" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="325" y="230" class="box-title">记录食材</text>
    <text x="325" y="258" class="box-text">文本 / 手动</text>
    <rect x="525" y="195" width="170" height="82" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="550" y="230" class="box-title">拍小票</text>
    <text x="550" y="258" class="box-text">图片识别</text>
    <rect x="750" y="195" width="190" height="82" rx="18" fill="#fef3c7" stroke="#fde68a"/>
    <text x="775" y="230" class="box-title">加入今日计划</text>
    <text x="775" y="258" class="box-text">缺菜确认</text>
    <rect x="995" y="195" width="170" height="82" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="1020" y="230" class="box-title">饭后更新</text>
    <text x="1020" y="258" class="box-text">扣减库存</text>
    <rect x="1220" y="195" width="190" height="82" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1245" y="230" class="box-title">导出 / 导入备份</text>
    <text x="1245" y="258" class="box-text">先确认再覆盖</text>
  </g>

  <!-- Frontend -->
  <g filter="url(#shadow)">
    <rect x="250" y="390" width="195" height="84" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="275" y="425" class="box-title">home-view</text>
    <text x="275" y="453" class="box-text">今日入口 / 弹窗</text>
    <rect x="505" y="390" width="195" height="84" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="530" y="425" class="box-title">ai.js</text>
    <text x="530" y="453" class="box-text">压缩 / 调用 / 兜底</text>
    <rect x="760" y="390" width="225" height="84" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="785" y="425" class="box-title">recommendations</text>
    <text x="785" y="453" class="box-text">库存匹配 / 推荐</text>
    <rect x="1045" y="390" width="245" height="84" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1070" y="425" class="box-title">plan-missing-check</text>
    <text x="1070" y="453" class="box-text">先计划，再询问补买</text>
    <rect x="1335" y="390" width="150" height="84" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1355" y="425" class="box-title">settings</text>
    <text x="1355" y="453" class="box-text">AI / 备份</text>
  </g>

  <!-- Local data -->
  <g filter="url(#shadow)">
    <rect x="260" y="590" width="190" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="285" y="625" class="box-title">localStorage</text>
    <text x="285" y="653" class="box-text">默认写入位置</text>
    <rect x="515" y="590" width="190" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="540" y="625" class="box-title">inventory</text>
    <text x="540" y="653" class="box-text">用户确认后写</text>
    <rect x="770" y="590" width="190" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="795" y="625" class="box-title">menu plan</text>
    <text x="795" y="653" class="box-text">今日计划</text>
    <rect x="1025" y="590" width="210" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="1050" y="625" class="box-title">shopping / overlay</text>
    <text x="1050" y="653" class="box-text">买菜 / 菜谱补丁</text>
    <rect x="1300" y="590" width="170" height="82" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="1325" y="625" class="box-title">settings</text>
    <text x="1325" y="653" class="box-text">不备份 API Key</text>
  </g>

  <!-- Backend -->
  <g filter="url(#shadow)">
    <rect x="360" y="782" width="220" height="84" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="385" y="817" class="box-title">Render Express</text>
    <text x="385" y="845" class="box-text">后端代理</text>
    <rect x="650" y="782" width="235" height="84" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="675" y="817" class="box-title">/api/ai-status</text>
    <text x="675" y="845" class="box-text">配置检测</text>
    <rect x="940" y="782" width="235" height="84" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="965" y="817" class="box-title">/api/ai-chat / parse</text>
    <text x="965" y="845" class="box-text">文本 / 视觉模型分流</text>
    <rect x="1230" y="782" width="220" height="84" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="1255" y="817" class="box-title">Groq / OpenAI</text>
    <text x="1255" y="845" class="box-text">兼容接口</text>
  </g>

  <!-- Arrows -->
  <path class="local" d="M385 277 V390"/>
  <path class="ai" d="M610 277 V390"/>
  <path class="local" d="M845 277 V390"/>
  <path class="local" d="M1080 277 V390"/>
  <path class="backup" d="M1315 277 V390"/>
  <path class="local" d="M348 474 V590"/>
  <path class="local" d="M873 474 V590"/>
  <path class="local" d="M1168 474 V590"/>
  <path class="backup" d="M1410 474 V590"/>
  <path class="ai" d="M603 474 C603 705, 470 705, 470 782"/>
  <path class="ai" d="M580 824 H650"/>
  <path class="ai" d="M885 824 H940"/>
  <path class="ai" d="M1175 824 H1230"/>
  <path class="local" d="M610 590 C610 540, 600 530, 600 474"/>
  <rect x="215" y="540" width="1080" height="190" rx="28" class="boundary"/>
  <text x="245" y="715" class="note">Safety boundary：AI 结果必须先显示给用户确认，确认后才写 localStorage。</text>
  <rect x="220" y="925" width="1170" height="46" rx="23" fill="#fff" opacity="0.82" stroke="#d7dee9"/>
  <text x="250" y="956" class="note">图例：绿色=本地数据流，蓝色=AI 请求流，橙色=备份导入导出；cloud mode 不暴露后端 API Key。</text>
</svg>
