<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Manager Product Journey</title>
  <desc id="desc">A six-stage product journey for Kitchen Manager users, from first visit to long-term use.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.48" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#eefdf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#213047" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#5f6f87"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 44px; font-weight: 850; fill: #152033; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; fill: #5f6a7a; }
      .stage-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 820; fill: #182236; }
      .stage-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; fill: #334155; }
      .chip { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 760; fill: #fff; }
      .caption { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #526072; }
      .arrow { fill: none; stroke: #5f6f87; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #94a3b8; stroke-width: 4; stroke-dasharray: 9 9; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="190" cy="130" r="190" fill="#fde68a" opacity="0.28"/>
  <circle cx="1260" cy="160" r="230" fill="#bae6fd" opacity="0.32"/>
  <circle cx="1060" cy="780" r="230" fill="#bbf7d0" opacity="0.26"/>
  <text x="70" y="78" class="title">Kitchen Manager Product Journey</text>
  <text x="72" y="116" class="subtitle">普通用户从空厨房开始，逐步完成记录、决策、买菜、做饭、更新和长期保存。</text>

  <g filter="url(#shadow)">
    <rect x="55" y="190" width="220" height="470" rx="30" fill="#fff" stroke="#f8d38d" stroke-width="2"/>
    <rect x="55" y="190" width="220" height="74" rx="30" fill="#fef3c7"/>
    <text x="86" y="237" class="stage-title">首次进入</text>
    <text x="90" y="317" class="stage-text">空厨房</text>
    <text x="90" y="363" class="stage-text">开始示例体验</text>
    <text x="90" y="409" class="stage-text">或记录真实食材</text>
    <rect x="88" y="565" width="116" height="36" rx="18" fill="#f59e0b"/>
    <text x="109" y="589" class="chip">本地优先</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="305" y="190" width="220" height="470" rx="30" fill="#fff" stroke="#bddcff" stroke-width="2"/>
    <rect x="305" y="190" width="220" height="74" rx="30" fill="#dbeafe"/>
    <text x="336" y="237" class="stage-title">记录厨房</text>
    <text x="340" y="317" class="stage-text">文本批量记</text>
    <text x="340" y="363" class="stage-text">小票识别</text>
    <text x="340" y="409" class="stage-text">AI 失败改用文本</text>
    <rect x="338" y="518" width="132" height="36" rx="18" fill="#2563eb"/>
    <text x="359" y="542" class="chip">AI 是加速器</text>
    <rect x="338" y="565" width="116" height="36" rx="18" fill="#64748b"/>
    <text x="358" y="589" class="chip">失败有兜底</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="555" y="190" width="220" height="470" rx="30" fill="#fff" stroke="#bae9c8" stroke-width="2"/>
    <rect x="555" y="190" width="220" height="74" rx="30" fill="#dcfce7"/>
    <text x="586" y="237" class="stage-title">今日决策</text>
    <text x="590" y="317" class="stage-text">今日状态</text>
    <text x="590" y="363" class="stage-text">推荐卡</text>
    <text x="590" y="409" class="stage-text">看缺什么</text>
    <rect x="588" y="565" width="116" height="36" rx="18" fill="#16a34a"/>
    <text x="608" y="589" class="chip">行动优先</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="805" y="190" width="220" height="470" rx="30" fill="#fff" stroke="#ffd1dc" stroke-width="2"/>
    <rect x="805" y="190" width="220" height="74" rx="30" fill="#ffe4e6"/>
    <text x="836" y="237" class="stage-title">安排做饭</text>
    <text x="840" y="317" class="stage-text">加入今日计划</text>
    <text x="840" y="363" class="stage-text">缺菜确认</text>
    <text x="840" y="409" class="stage-text">加入买菜清单</text>
    <rect x="838" y="565" width="116" height="36" rx="18" fill="#e11d48"/>
    <text x="858" y="589" class="chip">缺什么补什么</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1055" y="190" width="220" height="470" rx="30" fill="#fff" stroke="#d9d4ff" stroke-width="2"/>
    <rect x="1055" y="190" width="220" height="74" rx="30" fill="#ede9fe"/>
    <text x="1086" y="237" class="stage-title">饭后更新</text>
    <text x="1090" y="317" class="stage-text">饭后记一下</text>
    <text x="1090" y="363" class="stage-text">更新库存</text>
    <text x="1090" y="409" class="stage-text">改善下次推荐</text>
    <rect x="1088" y="565" width="116" height="36" rx="18" fill="#7c3aed"/>
    <text x="1108" y="589" class="chip">闭环更准</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1305" y="190" width="240" height="470" rx="30" fill="#fff" stroke="#c8edf1" stroke-width="2"/>
    <rect x="1305" y="190" width="240" height="74" rx="30" fill="#cffafe"/>
    <text x="1338" y="237" class="stage-title">长期使用</text>
    <text x="1340" y="317" class="stage-text">导出备份</text>
    <text x="1340" y="363" class="stage-text">添加到主屏幕</text>
    <text x="1340" y="409" class="stage-text">普通 / 高级设置</text>
    <rect x="1338" y="518" width="116" height="36" rx="18" fill="#0891b2"/>
    <text x="1358" y="542" class="chip">数据可备份</text>
    <rect x="1338" y="565" width="116" height="36" rx="18" fill="#0f766e"/>
    <text x="1358" y="589" class="chip">像 App 使用</text>
  </g>

  <path class="arrow" d="M275 425 H305"/>
  <path class="arrow" d="M525 425 H555"/>
  <path class="arrow" d="M775 425 H805"/>
  <path class="arrow" d="M1025 425 H1055"/>
  <path class="arrow" d="M1275 425 H1305"/>
  <path class="loop" d="M1165 660 C1165 760, 665 760, 665 660"/>
  <text x="752" y="793" class="caption">库存更新后，今日状态和推荐重新变准</text>
  <rect x="85" y="720" width="510" height="62" rx="31" fill="#fff" opacity="0.78" stroke="#d8e0ec"/>
  <text x="120" y="759" class="caption">体验原则：不强迫、不吓人，始终给下一步。</text>
</svg>
